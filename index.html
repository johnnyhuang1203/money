<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>記帳小幫手</title>
<style>
  :root{ --green:#06c755; --blue:#2563eb; --purple:#7c3aed; --bg:#f4f5f7; --line:#e3e6ea; --txt:#1f2430; --muted:#7a8190; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:-apple-system,"Helvetica Neue","PingFang TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--txt); }
  header{ background:#fff; padding:14px 16px; font-weight:700; font-size:18px; border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5; }
  .tabs{ display:flex; background:#fff; border-bottom:1px solid var(--line); position:sticky; top:51px; z-index:5; }
  .tabs button{ flex:1; border:0; background:none; padding:12px 4px; font-size:14px; font-weight:600; color:var(--muted); border-bottom:3px solid transparent; }
  .tabs button.on{ color:var(--txt); border-bottom-color:var(--green); }
  main{ padding:16px; max-width:560px; margin:0 auto; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:14px; }
  label{ display:block; font-size:13px; color:var(--muted); margin:10px 0 6px; }
  select,input{ width:100%; padding:12px; font-size:16px; border:1px solid var(--line); border-radius:10px; background:#fff; color:var(--txt); }
  .btn{ display:block; width:100%; padding:14px; font-size:16px; font-weight:700; color:#fff; background:var(--green); border:0; border-radius:12px; margin-top:14px; }
  .btn:active{ opacity:.85; } .btn.blue{ background:var(--blue);} .btn.purple{ background:var(--purple);}
  .hidden{ display:none; }
  .row{ display:flex; gap:10px; } .row>*{ flex:1; }
  h3{ margin:0 0 4px; font-size:16px; } .big{ font-size:26px; font-weight:800; }
  .catline{ display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed var(--line); }
  .catline b{ font-size:15px; } .item{ display:flex; justify-content:space-between; font-size:13px; color:var(--muted); padding:3px 0 3px 12px; }
  .total{ background:#0f1730; color:#fff; border-radius:12px; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; margin-top:12px; }
  .toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#1f2430; color:#fff; padding:11px 18px; border-radius:24px; font-size:14px; opacity:0; transition:.25s; z-index:20; }
  .toast.show{ opacity:1; }
  .muted{ color:var(--muted); font-size:13px; }
  .seg{ display:flex; gap:8px; margin-bottom:6px; }
  .seg button{ flex:1; padding:10px; border:1px solid var(--line); background:#fff; border-radius:10px; font-weight:600; color:var(--muted); }
  .seg button.on{ background:var(--green); color:#fff; border-color:var(--green); }
  #loading{ text-align:center; padding:60px 0; color:var(--muted); }
</style>
</head>
<body>
<header>📒 記帳小幫手</header>
<div class="tabs">
  <button id="t-add" class="on" onclick="show('add')">＋ 新增消費</button>
  <button id="t-sum" onclick="show('sum')">∑ 統計加總</button>
  <button id="t-bill" onclick="show('bill')">🧾 月帳單</button>
</div>

<main>
  <div id="loading">載入中…</div>

  <section id="p-add" class="hidden">
    <div class="card">
      <div class="seg">
        <button id="m-manual" class="on" onclick="mode('manual')">✍️ 手動輸入</button>
        <button id="m-photo" onclick="mode('photo')">📷 拍照導入</button>
      </div>
      <div id="photoBox" class="hidden">
        <label>拍照／選擇收據照片（自動讀金額）</label>
        <input type="file" accept="image/*" capture="environment" id="photo" onchange="doOcr()">
        <p class="muted" id="ocrMsg"></p>
      </div>
      <label>大類</label>
      <select id="cat" onchange="fillSub()"></select>
      <label>細項</label>
      <select id="sub"></select>
      <label>金額</label>
      <input type="number" id="amount" inputmode="decimal" placeholder="例如 1200">
      <label>備註（選填）</label>
      <input type="text" id="note" placeholder="例如 中午便當">
      <button class="btn" onclick="addExpense()">送出記帳</button>
    </div>
  </section>

  <section id="p-sum" class="hidden">
    <div id="sumBox"></div>
    <div class="card">
      <h3>➕ 借出款未還</h3>
      <div class="row">
        <div><label>金額</label><input type="number" id="lendAmt" inputmode="decimal" placeholder="5000"></div>
        <div><label>對象</label><input type="text" id="lendWho" placeholder="小明"></div>
      </div>
      <button class="btn blue" onclick="addLend()">記錄借出</button>
    </div>
  </section>

  <section id="p-bill" class="hidden">
    <div id="billBox"></div>
    <div class="card">
      <h3>➕ 新增信用卡金額</h3>
      <div class="row">
        <div><label>卡別</label><input type="text" id="ccCard" placeholder="國泰"></div>
        <div><label>金額</label><input type="number" id="ccAmt" inputmode="decimal" placeholder="3500"></div>
      </div>
      <label>用途（選填）</label>
      <input type="text" id="ccNote" placeholder="餐費">
      <button class="btn purple" onclick="addCC()">記錄信用卡</button>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
  /* ====== 只需確認這兩個值（已幫你填好）====== */
  const LIFF_ID  = '2010529851-UGGnBIR7';
  const API_URL  = 'https://script.google.com/macros/s/AKfycbwbHv4dZlmKCmh90XNZhYsQDyUztaZMKDjnqWI68ZsduP-bIwjOiMLi2q0tnS9y4NY3/exec';
  /* ========================================== */

  const SUB = {
    '家庭開支': ['伙食','水電瓦斯','房租房貸','管理費','日用品','醫療','子女教育','交通','通訊網路','保險','孝親費','家電家具','其他'],
    '個人開支': ['餐飲','服飾','娛樂','交通','通訊','保健','美容理髮','學習進修','訂閱服務','貸款還款','保險','其他'],
    '業務開支': ['宴請客戶','交通差旅','住宿','送禮','辦公用品','通訊','行銷廣告','設備','外包服務','交際應酬','其他']
  };
  let USER = { id:'', name:'' };

  async function api(payload){
    const res = await fetch(API_URL, { method:'POST', body: JSON.stringify(payload) });
    return await res.json();
  }
  function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

  async function init(){
    try{
      await liff.init({ liffId: LIFF_ID });
      if(liff.isLoggedIn()){
        const p = await liff.getProfile();
        USER = { id:p.userId, name:p.displayName };
      } else if(liff.isInClient()){
        liff.login(); return;
      } else {
        USER = { id:'TEST_USER', name:'外部測試' };
      }
    }catch(e){ USER = { id:'TEST_USER', name:'測試' }; }

    const cat = document.getElementById('cat');
    Object.keys(SUB).forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c.replace('開支',''); cat.appendChild(o); });
    fillSub();
    document.getElementById('loading').classList.add('hidden');
    const tab = new URLSearchParams(location.search).get('tab') || 'add';
    show(tab==='sum'?'sum':tab==='bill'?'bill':'add');
  }

  function fillSub(){
    const c=document.getElementById('cat').value, sub=document.getElementById('sub'); sub.innerHTML='';
    (SUB[c]||[]).forEach(s=>{ const o=document.createElement('option'); o.value=s; o.textContent=s; sub.appendChild(o); });
  }
  function mode(m){
    document.getElementById('m-manual').classList.toggle('on', m==='manual');
    document.getElementById('m-photo').classList.toggle('on', m==='photo');
    document.getElementById('photoBox').classList.toggle('hidden', m!=='photo');
  }
  function show(tab){
    ['add','sum','bill'].forEach(t=>{
      document.getElementById('p-'+t).classList.toggle('hidden', t!==tab);
      document.getElementById('t-'+t).classList.toggle('on', t===tab);
    });
    if(tab==='sum') loadSum();
    if(tab==='bill') loadBill();
  }

  async function addExpense(){
    const amount=parseFloat(document.getElementById('amount').value);
    if(!amount||amount<=0){ toast('請輸入金額'); return; }
    const r=await api({ action:'add', userId:USER.id, name:USER.name,
      cat:document.getElementById('cat').value, sub:document.getElementById('sub').value,
      amount:amount, note:document.getElementById('note').value });
    toast(r&&r.ok?'✅ '+r.message:'記帳失敗');
    document.getElementById('amount').value=''; document.getElementById('note').value='';
  }

  function doOcr(){
    const f=document.getElementById('photo').files[0]; if(!f) return;
    document.getElementById('ocrMsg').textContent='讀取中…';
    const img=new Image(), reader=new FileReader();
    reader.onload=e=>{ img.onload=async()=>{
      const max=1280, sc=Math.min(1,max/Math.max(img.width,img.height));
      const cv=document.createElement('canvas'); cv.width=img.width*sc; cv.height=img.height*sc;
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      const b64=cv.toDataURL('image/jpeg',0.7).split(',')[1];
      try{
        const r=await api({ action:'ocr', imageBase64:b64, mimeType:'image/jpeg' });
        if(r&&r.ok&&r.amount){ document.getElementById('amount').value=r.amount; document.getElementById('ocrMsg').textContent='✅ 讀到金額：'+r.amount+'，請選類別後送出'; }
        else document.getElementById('ocrMsg').textContent='讀不到金額，請手動輸入';
      }catch(err){ document.getElementById('ocrMsg').textContent='讀取失敗，請手動輸入'; }
    }; img.src=e.target.result; };
    reader.readAsDataURL(f);
  }

  async function loadSum(){
    const box=document.getElementById('sumBox'); box.innerHTML='<div class="card muted">載入中…</div>';
    const r=await api({ action:'analysis', userId:USER.id }), d=r.data;
    let h='<div class="card"><h3>📊 '+d.year+' 年 '+d.month+' 月開支分析</h3>';
    d.cats.forEach(c=>{ h+='<div class="catline"><b>'+c.cat+'</b><b>NT$'+fmt(c.total)+'</b></div>';
      c.items.forEach(i=> h+='<div class="item"><span>'+i.name+'</span><span>NT$'+fmt(i.amount)+'</span></div>'); });
    h+='<div class="total"><span>本月開支總計</span><span class="big">NT$'+fmt(d.total)+'</span></div>';
    if(d.lent>0) h+='<p class="muted">💸 借出未還（本月）：NT$'+fmt(d.lent)+'</p>';
    h+='</div>'; box.innerHTML=h;
  }
  async function addLend(){
    const amt=parseFloat(document.getElementById('lendAmt').value);
    if(!amt||amt<=0){ toast('請輸入金額'); return; }
    const r=await api({ action:'lend', userId:USER.id, name:USER.name, amount:amt, who:document.getElementById('lendWho').value });
    toast(r.ok?'✅ '+r.message:'失敗');
    document.getElementById('lendAmt').value=''; document.getElementById('lendWho').value=''; loadSum();
  }

  async function loadBill(){
    const box=document.getElementById('billBox'); box.innerHTML='<div class="card muted">載入中…</div>';
    const r=await api({ action:'monthlybill', userId:USER.id }), d=r.data;
    let h='<div class="card"><h3>🧾 '+d.year+' 年 '+d.month+' 月帳單</h3>';
    h+='<div class="catline"><span>系統記帳合計</span><b>NT$'+fmt(d.sys)+'</b></div>';
    h+='<div class="catline"><span>信用卡合計</span><b>NT$'+fmt(d.cc)+'</b></div>';
    (d.ccItems||[]).forEach(i=> h+='<div class="item"><span>'+i.card+'</span><span>NT$'+fmt(i.amount)+'</span></div>');
    h+='<div class="total"><span>本月總金額</span><span class="big">NT$'+fmt(d.total)+'</span></div></div>';
    box.innerHTML=h;
  }
  async function addCC(){
    const amt=parseFloat(document.getElementById('ccAmt').value);
    if(!amt||amt<=0){ toast('請輸入金額'); return; }
    const r=await api({ action:'cc', userId:USER.id, name:USER.name, card:document.getElementById('ccCard').value, amount:amt, note:document.getElementById('ccNote').value });
    toast(r.ok?'✅ '+r.message:'失敗');
    document.getElementById('ccCard').value=''; document.getElementById('ccAmt').value=''; document.getElementById('ccNote').value=''; loadBill();
  }

  function fmt(n){ return Number(n||0).toLocaleString('en-US'); }
  init();
</script>
</body>
</html>
